<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clause Library | Clauselab</title>
<meta name="description" content="Sixty-plus practitioner-drafted clauses across confidentiality, indemnification, liability, data protection, and more. Add your own.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="css/app.css">
<link rel="stylesheet" href="css/nav.css">
</head>
<body>

<section class="page">
  <div class="container-wide">
    <div class="page-header">
      <span class="page-eyebrow">Library</span>
      <h1 class="page-title">Clauses</h1>
      <p class="page-lead">Starter clauses across fourteen-plus categories. Add custom variants for your own practice. Everything is searchable and filterable, and stays in your browser.</p>
    </div>

    <div class="page-toolbar">
      <input id="clause-search" class="input search" placeholder="Search clauses by title, text, jurisdiction, or tag…" style="flex: 1; max-width: 420px;">
      <button id="btn-add-clause" class="btn btn-accent btn-sm">+ Add custom clause</button>
    </div>

    <div class="clause-list mt-3">
      <div id="clause-sidebar-list" class="clause-sidebar"></div>
      <div id="clause-cards" class="clause-cards"></div>
    </div>
  </div>
</section>

<!-- Clause Modal -->
<div class="modal-backdrop" id="clause-modal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div class="modal-title" id="clause-modal-title">Add clause</div>
      <button class="modal-close" data-close-clause>
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field" style="grid-column: 1 / -1;">
          <label>Title <span style="color: var(--danger);">*</span></label>
          <input id="cf-title" class="input" placeholder="e.g. Mutual Indemnification (SaaS)">
        </div>
        <div class="field">
          <label>Category <span style="color: var(--danger);">*</span></label>
          <select id="cf-category" class="select"></select>
        </div>
        <div class="field">
          <label>Jurisdiction</label>
          <input id="cf-jurisdiction" class="input" placeholder="e.g. India, EU, Neutral">
        </div>
        <div class="field" style="grid-column: 1 / -1;">
          <label>Tags (comma-separated)</label>
          <input id="cf-tags" class="input" placeholder="e.g. MSA, SaaS, Risk allocation">
        </div>
        <div class="field" style="grid-column: 1 / -1;">
          <label>Clause body <span style="color: var(--danger);">*</span></label>
          <textarea id="cf-body" class="textarea" style="min-height: 220px;" placeholder="Paste or type the clause text here…"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close-clause>Cancel</button>
      <button id="btn-save-clause" class="btn btn-accent">Save clause</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/clauses.js"></script>
</body>
</html>
